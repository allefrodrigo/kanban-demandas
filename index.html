<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban — A Tática</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise-overlay"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-mark">▲</span>
        <h1 class="project-name" id="project-name">A Tática</h1>
      </div>
      <div class="header-meta">
        <span class="meta-label">Atualizado em</span>
        <span class="meta-value" id="last-updated">—</span>
        <button class="demand-btn" id="open-demand" title="Solicitar demanda">+ Solicitar</button>
        <button class="theme-toggle" id="theme-toggle" title="Alternar tema">☀</button>
      </div>
    </div>
  </header>

  <main class="board-wrapper">
    <div class="kanban-grid" id="kanban-grid" role="list" aria-label="Quadro de demandas">
      <!-- Colunas renderizadas via app.js -->
    </div>
  </main>

  <!-- Dialog Solicitar Demanda -->
  <div class="dialog-overlay" id="demand-overlay">
    <div class="dialog">
      <div class="dialog-header">
        <span class="dialog-title">Solicitar Demanda</span>
        <button class="dialog-close" id="demand-close">&times;</button>
      </div>
      <div class="dialog-progress">
        <div class="dialog-progress-fill" id="dialog-progress-fill"></div>
      </div>
      <div class="dialog-steps" id="dialog-steps">
        <!-- Step 1 -->
        <div class="dialog-step active" data-step="1">
          <label class="step-label">Qual o título da solicitação?</label>
          <p class="step-hint">Um nome curto que resuma o pedido.</p>
          <input type="text" class="step-input" id="demand-title" placeholder="Ex: Cadastro de alunos do 9º ano" />
        </div>
        <!-- Step 2 -->
        <div class="dialog-step" data-step="2">
          <label class="step-label">O que está acontecendo?</label>
          <p class="step-hint">Descreva a situação atual ou o problema encontrado.</p>
          <textarea class="step-textarea" id="demand-problem" placeholder="Ex: Os alunos não conseguem finalizar o cadastro porque..."></textarea>
        </div>
        <!-- Step 3 -->
        <div class="dialog-step" data-step="3">
          <label class="step-label">O que deveria acontecer?</label>
          <p class="step-hint">Descreva o comportamento esperado ou a melhoria desejada.</p>
          <textarea class="step-textarea" id="demand-expected" placeholder="Ex: O sistema deveria permitir que..."></textarea>
        </div>
        <!-- Step 4 -->
        <div class="dialog-step" data-step="4">
          <label class="step-label">Tem um link de onde acontece?</label>
          <p class="step-hint">Opcional. Cole a URL da página onde o problema ocorre.</p>
          <input type="url" class="step-input" id="demand-link" placeholder="https://..." />
        </div>
        <!-- Step 5 -->
        <div class="dialog-step" data-step="5">
          <label class="step-label">Qual a prioridade?</label>
          <p class="step-hint">Escolha o nível de urgência dessa solicitação.</p>
          <div class="priority-options" id="priority-options">
            <button class="priority-opt" data-value="alta">Alta</button>
            <button class="priority-opt" data-value="media">Média</button>
            <button class="priority-opt" data-value="baixa">Baixa</button>
          </div>
        </div>
        <!-- Step 6: Preview -->
        <div class="dialog-step" data-step="6">
          <label class="step-label">Confira sua solicitação</label>
          <div class="demand-preview" id="demand-preview"></div>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="dialog-btn secondary" id="step-back" style="display:none">Voltar</button>
        <button class="dialog-btn primary" id="step-next">Próximo</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
